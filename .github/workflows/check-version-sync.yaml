name: check version sync

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: check version sync
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: check-version-sync --all-files
