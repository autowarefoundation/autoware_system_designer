autoware_system_design_format: 0.3.0

name: LidarDummy.module

instances:
  - name: lidar_top
    entity: LidarDummyDriver.node
  - name: lidar_left
    entity: LidarDummyDriver.node
  - name: lidar_right
    entity: LidarDummyDriver.node
  - name: lidar_rear
    entity: LidarDummyDriver.node
  - name: lidar_concatenate
    entity: ConcatenatePointcloudDummy.node

subscribers: []
publishers:
  - name: top/pointcloud
  - name: left/pointcloud
  - name: right/pointcloud
  - name: rear/pointcloud
  - name: concatenated/pointcloud

connections:
  # individual lidar outputs
  - [lidar_top.output.pointcloud, output.top/pointcloud]
  - [lidar_left.output.pointcloud, output.left/pointcloud]
  - [lidar_right.output.pointcloud, output.right/pointcloud]
  - [lidar_rear.output.pointcloud, output.rear/pointcloud]
  # concatenated lidar output
  - [lidar_top.output.pointcloud, lidar_concatenate.input.input1]
  - [lidar_left.output.pointcloud, lidar_concatenate.input.input2]
  - [lidar_right.output.pointcloud, lidar_concatenate.input.input3]
  - [lidar_rear.output.pointcloud, lidar_concatenate.input.input4]
  - [lidar_concatenate.output.output, output.concatenated/pointcloud]
