autoware_system_design_format: 0.3.0

name: RadarDummy.module

instances:
  - name: radar_front_center
    entity: RadarDummyDriver.node
  - name: radar_front_left
    entity: RadarDummyDriver.node
  - name: radar_front_right
    entity: RadarDummyDriver.node
  - name: radar_rear_center
    entity: RadarDummyDriver.node
  - name: radar_rear_left
    entity: RadarDummyDriver.node
  - name: radar_rear_right
    entity: RadarDummyDriver.node

  - name: simple_object_merger
    entity: DetectedObjectMergerDummy6.node
  - name: simple_tracked_object_merger
    entity: TrackedObjectMergerDummy6.node

subscribers: []
publishers:
  - name: detected_objects
  - name: tracked_objects

connections:
  - [
      radar_front_center.output.detected_objects,
      simple_object_merger.input.object1,
    ]
  - [
      radar_front_left.output.detected_objects,
      simple_object_merger.input.object2,
    ]
  - [
      radar_front_right.output.detected_objects,
      simple_object_merger.input.object3,
    ]
  - [
      radar_rear_center.output.detected_objects,
      simple_object_merger.input.object4,
    ]
  - [
      radar_rear_left.output.detected_objects,
      simple_object_merger.input.object5,
    ]
  - [
      radar_rear_right.output.detected_objects,
      simple_object_merger.input.object6,
    ]
  - [simple_object_merger.output.merged_object, output.detected_objects]

  - [
      radar_front_center.output.tracked_objects,
      simple_tracked_object_merger.input.object1,
    ]
  - [
      radar_front_left.output.tracked_objects,
      simple_tracked_object_merger.input.object2,
    ]
  - [
      radar_front_right.output.tracked_objects,
      simple_tracked_object_merger.input.object3,
    ]
  - [
      radar_rear_center.output.tracked_objects,
      simple_tracked_object_merger.input.object4,
    ]
  - [
      radar_rear_left.output.tracked_objects,
      simple_tracked_object_merger.input.object5,
    ]
  - [
      radar_rear_right.output.tracked_objects,
      simple_tracked_object_merger.input.object6,
    ]
  - [simple_tracked_object_merger.output.merged_object, output.tracked_objects]
