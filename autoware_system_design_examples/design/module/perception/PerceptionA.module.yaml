autoware_system_design_format: 0.3.0

name: PerceptionA.module

instances:
  - name: detector_a1
    entity: DetectorA.module
  - name: detector_a2
    entity: DetectorA.module
  - name: node_tracker
    entity: Tracker.node
  - name: node_predictor
    entity: Predictor.node

subscribers:
  - name: vector_map
  - name: pointcloud
publishers:
  - name: objects

connections:
  - [input.pointcloud, detector_a2.input.pointcloud]
  - [input.vector_map, detector_a2.input.vector_map]
  - [input.vector_map, node_predictor.input.lanelet_map]
  # wildcard connection
  - [input.*, detector_a1.input.*]
  - [detector_a1.output.objects, node_tracker.input.objects1]
  - [detector_a2.output.objects, node_tracker.input.objects2]
  - [node_tracker.output.objects, node_predictor.input.objects]
  - [node_predictor.output.objects, output.objects]
