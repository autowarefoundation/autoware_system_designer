autoware_system_design_format: 0.3.0

name: DetectorA.module

instances:
  - name: node_detector
    entity: DetectorA.node
  - name: node_filter
    entity: FilterA.node

subscribers:
  - name: pointcloud
  - name: vector_map
publishers:
  - name: objects

connections:
  - [input.pointcloud, node_detector.input.pointcloud]
  - [node_detector.output.objects, node_filter.input.objects]
  - [input.vector_map, node_filter.input.vector_map]
  - [node_filter.output.*, output.*]
